.toppers-grid {
    grid-template-columns: repeat(4, minmax(0,1fr));
}

@media (max-width: 1024px) {
    .toppers-grid {
        grid-template-columns: repeat(2, minmax(0,1fr));
    }
}

@media (max-width: 768px) {
    .toppers-grid .topper-card {
        display: block;
    }
    /* Removed duplicate mobile @media block */
}
